name: Deploy to Strato

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Stage site files
        run: |
          mkdir -p _site
          rsync -av \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='_site' \
            --exclude='README.md' \
            --exclude='.gitignore' \
            ./ _site/

      - name: Install lftp
        run: sudo apt-get update -qq && sudo apt-get install -y -qq lftp

      - name: Deploy /website on Strato
        env:
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SFTP_USER: ${{ secrets.SFTP_USERNAME }}
          SFTP_PASS: ${{ secrets.SFTP_PASSWORD }}
        run: |
          lftp -u "$SFTP_USER,$SFTP_PASS" "sftp://$SFTP_HOST:22" <<'EOF'
          set sftp:auto-confirm yes
          set net:max-retries 2
          set net:timeout 30
          mkdir -p /website
          mirror -R --verbose --parallel=3 ./_site /website
          bye
          EOF
